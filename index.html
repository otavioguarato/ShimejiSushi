<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShimejiSushi - Pedido Online</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; padding-bottom: 80px; }
        .header { background: #e74c3c; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; }
        .container { padding: 15px; }
        .produto { background: #1e1e1e; padding: 15px; margin-bottom: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .price { color: #f1c40f; font-weight: bold; }
        button { background: #e74c3c; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
        .carrinho-fixo { position: fixed; bottom: 0; width: 100%; background: #25d366; color: white; padding: 15px; text-align: center; font-weight: bold; text-decoration: none; display: none; }
        .pix-section { background: #2d2d2d; padding: 15px; border-radius: 10px; margin-top: 20px; text-align: center; border: 1px dashed #f1c40f; }
    </style>
</head>
<body>

<div class="header">
    <h1>🍣 ShimejiSushi</h1>
    <p>Escolha suas delícias</p>
</div>

<div class="container">
    <div class="produto">
        <div><strong>Combo 20 Peças</strong><br><span class="price">R$ 59,90</span></div>
        <button onclick="add('Combo 20 Peças', 59.90)">+ Adicionar</button>
    </div>

    <div class="produto">
        <div><strong>Shimeji na Manteiga</strong><br><span class="price">R$ 35,00</span></div>
        <button onclick="add('Shimeji na Manteiga', 35.00)">+ Adicionar</button>
    </div>

    <div class="produto">
        <div><strong>Temaki Salmão</strong><br><span class="price">R$ 28,00</span></div>
        <button onclick="add('Temaki Salmão', 28.00)">+ Adicionar</button>
    </div>

    <div class="pix-section">
        <p>🔑 <strong>Chave PIX (E-mail ou Celular):</strong><br>seu-email@aqui.com</p>
        <small>Pague e envie o comprovante pelo WhatsApp</small>
    </div>
</div>

<a href="#" id="btn-carrinho" class="carrinho-fixo" onclick="finalizar()">
    🛒 Ver Carrinho: R$ <span id="total">0.00</span>
</a>

<script>
    let carrinho = [];
    let total = 0;

    function add(nome, preco) {
        carrinho.push(nome);
        total += preco;
        document.getElementById('total').innerText = total.toFixed(2);
        document.getElementById('btn-carrinho').style.display = 'block';
    }

    function finalizar() {
        const tel = "553499365141"; // <-- COLOQUE SEU NUMERO AQUI
        let msg = "🍣 *Novo Pedido - ShimejiSushi*%0A%0A";
        carrinho.forEach(item => msg += "- " + item + "%0A");
        msg += "%0A*Total:* R$ " + total.toFixed(2);
        msg += "%0A%0APagamento via PIX enviado em anexo.";
        window.open(`https://wa.me/${tel}?text=${msg}`);
    }
</script>

</body>
</html>
