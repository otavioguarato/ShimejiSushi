      admin_password: "todopoderoso",
      whatsapp_number: "553499365141"
    };

    // 3. INICIALIZAÇÃO SEGURA DO DATA SDK
    const dataHandler = {
      onDataChanged: (data) => {
        console.log("🔄 Dados Recebidos:", data);
        allOrders = Array.isArray(data) ? data : [];
        if (document.getElementById('admin-view')) renderAdminList();
      }
    };

    (async () => {
      try {
        if (window.dataSdk) {
          const result = await window.dataSdk.init(dataHandler);
          if (result && result.isOk) isInitialized = true;
        }
      } catch (e) { console.error("Erro SDK:", e); }
    })();
