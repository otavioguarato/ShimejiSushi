<div id="cart-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:1000; padding:20px; flex-direction:column;">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <h2 style="color:var(--gold); font-family:'Noto Serif JP'; font-size:20px;">Seu Pedido</h2>
    <button onclick="closeCart()" style="color:var(--white);">Fechar</button>
  </div>
  
  <div id="cart-items-list" style="flex:1; overflow-y:auto; color:var(--white);">
    </div>

  <button onclick="checkoutWhatsApp()" style="width:100%; padding:15px; background:var(--green); border-radius:12px; color:white; font-weight:700;">
    Enviar Pedido via WhatsApp
  </button>
</div>
