<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shimeji Sushi Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #0f172a; color: white; overflow-x: hidden; }
        .font-display { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-cat { background-color: #ef4444 !important; border-color: #ef4444 !important; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="pb-20 md:pb-0">

    <header class="relative h-64 flex flex-col items-center justify-center text-center px-4 border-b border-white/5 bg-slate-900">
        <div class="absolute inset-0 opacity-30">
            <img src="https://images.unsplash.com/photo-1579871494447-9811cf80d66c?auto=format&fit=crop&w=1000&q=80" class="w-full h-full object-cover">
        </div>
        <div onclick="openAdmin()" class="relative z-10 cursor-pointer hover:scale-105 transition-transform">
            <h1 class="text-4xl md:text-6xl font-display font-bold text-white drop-shadow-lg">🍣 Shimeji Sushi</h1>
            <p class="text-red-500 tracking-[0.3em] uppercase text-xs md:text-sm mt-2 font-bold">O melhor do Japão na sua mesa</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-2">
            <div class="flex gap-3 overflow-x-auto pb-6 no-scrollbar">
                <button onclick="filterItems('all')" class="cat-btn active-cat px-6 py-2 rounded-full glass text-sm font-bold transition-all flex-shrink-0">🍱 Todos</button>
                <button onclick="filterItems('combos')" class="cat-btn px-6 py-2 rounded-full glass text-sm font-bold transition-all flex-shrink-0">🎁 Combos</button>
                <button onclick="filterItems('sushis')" class="cat-btn px-6 py-2 rounded-full glass text-sm font-bold transition-all flex-shrink-0">🍣 Sushis</button>
                <button onclick="filterItems('bebidas')" class="cat-btn px-6 py-2 rounded-full glass text-sm font-bold transition-all flex-shrink-0">🥤 Bebidas</button>
            </div>

            <div id="menu-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                </div>
        </div>

        <aside class="hidden lg:block">
            <div class="glass p-6 rounded-3xl sticky top-8">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2">🛒 Seu Carrinho</h2>
                <div id="cart-list" class="space-y-4 mb-6 max-h-60 overflow-y-auto pr-2">
                    <p class="text-gray-500 text-center py-4 text-sm">Carrinho vazio</p>
                </div>
                
                <div class="border-t border-white/10 pt-4 space-y-3">
                    <input id="addr-desk" type="text" placeholder="Endereço de entrega" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:border-red-500 outline-none">
                    <select id="pay-desk" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none">
                        <option value="" class="bg-slate-900">Forma de Pagamento</option>
                        <option value="Pix" class="bg-slate-900">📱 Pix</option>
                        <option value="Cartão" class="bg-slate-900">💳 Cartão</option>
                        <option value="Dinheiro" class="bg-slate-900">💵 Dinheiro</option>
                    </select>
                    
                    <div class="flex justify-between items-center py-2 font-bold text-lg">
                        <span>Total:</span>
                        <span id="cart-total" class="text-green-400">R$
