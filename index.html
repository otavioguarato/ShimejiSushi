<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shimeji Sushi Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff4d4d; --dark: #0f172a; }
        body { font-family: 'Noto Sans JP', sans-serif; background-color: var(--dark); color: white; }
        .font-display { font-family: 'Playfair Display', serif; }
        .active-category { background: #dc2626 !important; border-color: #dc2626 !important; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="pb-24 md:pb-0">

    <header class="relative h-64 flex flex-col items-center justify-center text-center px-4 overflow-hidden">
        <div class="absolute inset-0 z-0">
            <img src="https://images.unsplash.com/photo-1579871494447-9811cf80d66c?auto=format&fit=crop&w=1000&q=80" class="w-full h-full object-cover opacity-30">
            <div class="absolute inset-0 bg-gradient-to-t from-slate-900 to-transparent"></div>
        </div>
        
        <div onclick="openAdmin()" class="relative z-10 cursor-pointer">
            <h1 class="text-4xl md:text-6xl font-display font-bold text-white mb-2">🍣 Shimeji Sushi</h1>
            <p class="text-red-400 tracking-[0.3em] uppercase text-xs md:text-sm">Sabor autêntico japonês</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-2">
            <div class="flex gap-3 overflow-x-auto pb-6 no-scrollbar">
                <button onclick="filterCat('all')" id="cat-all" class="category-btn active-category flex-shrink-0 px-6 py-2 rounded-full glass text-sm font-medium transition-all">🍱 Todos</button>
                <button onclick="filterCat('combos')" id="cat-combos" class="category-btn flex-shrink-0 px-6 py-2 rounded-full glass text-sm font-medium transition-all">🎁 Combos</button>
                <button onclick="filterCat('sushis')" id="cat-sushis" class="category-btn flex-shrink-0 px-6 py-2 rounded-full glass text-sm font-medium transition-all">🍣 Sushis</button>
                <button onclick="filterCat('bebidas')" id="cat-bebidas" class="category-btn flex-shrink-0 px-6 py-2 rounded-full glass text-sm font-medium transition-all">🥤 Bebidas</button>
            </div>

            <div id="menu-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                </div>
        </div>
