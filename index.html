<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Digital Estilo Brenda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .cart-modal { display: none; }
        .cart-modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-50 pb-32">

    <header class="bg-red-600 text-white p-6 shadow-md text-center">
        <div class="w-20 h-20 bg-white rounded-full mx-auto mb-2 flex items-center justify-center">
            <i class="fas fa-utensils text-red-600 text-3xl"></i>
        </div>
        <h1 class="text-2xl font-bold italic">BURGER MASTER</h1>
        <p class="text-sm opacity-90"><i class="fas fa-clock"></i> Aberto agora (Entrega em 40min)</p>
    </header>

    <nav class="flex overflow-x-auto p-4 space-x-4 sticky top-0 bg-white z-10 shadow-sm">
        <button class="bg-red-100 text-red-600 px-4 py-1 rounded-full font-bold whitespace-nowrap">Burgers</button>
        <button class="bg-gray-100 text-gray-600 px-4 py-1 rounded-full font-bold whitespace-nowrap">Bebidas</button>
        <button class="bg-gray-100 text-gray-600 px-4 py-1 rounded-full font-bold whitespace-nowrap">Combos</button>
    </nav>

    <main class="p-4 max-w-lg mx-auto space-y-4" id="menu">
        <div class="bg-white p-3 rounded-xl shadow-sm flex border border-gray-100 items-center justify-between">
            <div class="flex-1">
                <h3 class="font-bold text-gray-800">Cheddar Bacon</h3>
                <p class="text-xs text-gray-500">Pão, carne 150g, muito cheddar e bacon crocante.</p>
                <span class="text-green-600 font-bold block mt-1">R$ 28,90</span>
            </div>
            <button onclick="addToCart('Cheddar Bacon', 28.90)" class="bg-red-500 text-white w-10 h-10 rounded-lg flex items-center justify-center ml-4">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <div class="bg-white p-3 rounded-xl shadow-sm flex border border-gray-100 items-center justify-between">
            <div class="flex-1">
                <h3 class="font-bold text-gray-800">Coca-Cola Lata</h3>
                <p class="text-xs text-gray-500">Geladinha 350ml.</p>
                <span class="text-green-600 font-bold block mt-1">R$ 6,00</span>
            </div>
            <button onclick="addToCart('Coca-Cola Lata', 6.00)" class="bg-red-500 text-white w-10 h-10 rounded-lg flex items-center justify-center ml-4">
                <i class="fas fa-plus"></i>
            </button>
        </div>
    </main>

    <div id="cart-footer" class="fixed bottom-0 left-0 right-0 bg-white p-4 border-t shadow-[0_-5px_15px_rgba(0,0,0,0.1)] hidden justify-between items-center z-20">
        <div>
            <p class="text-xs text-gray-400">Total do pedido:</p>
            <p id="cart-total" class="text-xl font-bold text-green-600">R$ 0,00</p>
        </div>
        <button onclick="toggleModal()" class="bg-red-600 text-white px-8 py-3 rounded-xl font-bold">
            Ver Pedido <i class="fas fa-shopping-cart ml-2"></i>
        </button>
    </div>

    <div id="modal" class="cart-modal fixed inset-0 bg-black bg-opacity-50 z-30 flex-col justify-end p-4">
        <div class="bg-white rounded-t-3xl w-full max-w-lg mx-auto p-6 overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Finalizar Pedido</h2>
                <button onclick="toggleModal()" class="text-gray-400 text-2xl">&times;</button>
            </div>

            <div class="space-y-4 mb-6">
                <input id="nome" type="text" placeholder="Seu Nome" class="w-full border p-3 rounded-lg">
                <input id="rua" type="text" placeholder="Rua e
