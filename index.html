<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Multi Language Website</title>

<style>

body{
font-family:Arial;
padding:40px;
background:#f5f5f5;
}

.language-select{
padding:8px;
font-size:16px;
margin-bottom:20px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<!-- Language Selector -->

<select class="language-select" id="languageSwitcher">

<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="pt">Portuguese</option>
<option value="es">Spanish</option>
<option value="fr">French</option>
<option value="de">German</option>
<option value="zh">Chinese</option>
<option value="ja">Japanese</option>

</select>


<div class="box">

<h1 data-translate="title">Welcome to my website</h1>

<p data-translate="description">
This website supports multiple languages.  
You can switch language using the dropdown.
</p>

<button data-translate="button">Add to Cart</button>

</div>


<script>

const translations = {

en:{
title:"Welcome to my website",
description:"This website supports multiple languages. You can switch language using the dropdown.",
button:"Add to Cart"
},

hi:{
title:"मेरी वेबसाइट में आपका स्वागत है",
description:"यह वेबसाइट कई भाषाओं का समर्थन करती है। आप ड्रॉपडाउन से भाषा बदल सकते हैं।",
button:"कार्ट में जोड़ें"
},

pt:{
title:"Bem-vindo ao meu site",
description:"Este site suporta vários idiomas. Você pode mudar o idioma usando o menu.",
button:"Adicionar ao carrinho"
},

es:{
title:"Bienvenido a mi sitio web",
description:"Este sitio web admite varios idiomas. Puede cambiar el idioma usando el menú.",
button:"Agregar al carrito"
},

fr:{
title:"Bienvenue sur mon site",
description:"Ce site prend en charge plusieurs langues. Vous pouvez changer la langue avec le menu.",
button:"Ajouter au panier"
},

de:{
title:"Willkommen auf meiner Website",
description:"Diese Website unterstützt mehrere Sprachen. Sie können die Sprache über das Menü ändern.",
button:"In den Warenkorb"
},

zh:{
title:"欢迎来到我的网站",
description:"本网站支持多种语言。您可以使用菜单切换语言。",
button:"加入购物车"
},

ja:{
title:"私のウェブサイトへようこそ",
description:"このサイトは複数の言語をサポートしています。",
button:"カートに追加"
}

};


const languageSwitcher = document.getElementById("languageSwitcher");


function translatePage(language){

const elements = document.querySelectorAll("[data-translate]");

elements.forEach(element => {

const key = element.getAttribute("data-translate");

element.textContent = translations[language][key];

});

}


languageSwitcher.addEventListener("change",function(){

const selectedLang = this.value;

translatePage(selectedLang);

localStorage.setItem("language",selectedLang);

});


window.onload = function(){

const savedLang = localStorage.getItem("language") || "en";

languageSwitcher.value = savedLang;

translatePage(savedLang);

};

</script>

</body>
</html>
