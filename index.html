<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // SUAS CREDENCIAIS COPIADAS DO CONSOLE
  const firebaseConfig = {
    apiKey: "SUA_API_KEY",
    authDomain: "seu-projeto.firebaseapp.com",
    projectId: "seu-projeto",
    storageBucket: "seu-projeto.appspot.com",
    messagingSenderId: "seu-id",
    appId: "seu-app-id"
  };

  // Inicializar Firebase e Firestore
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Função para salvar pedido no servidor (Firebase)
  async function saveOrderToFirebase(orderData) {
    try {
      const docRef = await addDoc(collection(db, "pedidos"), {
        ...orderData,
        status: "pendente",
        createdAt: serverTimestamp()
      });
      console.log("Pedido enviado com ID: ", docRef.id);
      return docRef.id;
    } catch (e) {
      console.error("Erro ao salvar pedido: ", e);
      throw e;
    }
  }

  // Integrar com sua função de checkout existente
  window.finalizarPedido = async () => {
    const isMobile = window.innerWidth < 768;
    const address = document.getElementById(isMobile ? 'address-mobile' : 'address-desktop').value;
    const payment = document.getElementById(isMobile ? 'payment-mobile' : 'payment-desktop').value;

    if (!address || !payment || cart.length === 0) {
      alert("Preencha todos os dados!");
      return;
    }

    const orderData = {
      itens: cart,
      total: cart.reduce((sum, i) => sum + (i.price * i.quantity), 0),
      endereco: address,
      pagamento: payment,
      cliente: "Cliente Web" // Você pode adicionar um campo de nome no HTML
    };

    // 1. Envia para o Banco de Dados (Servidor)
    showToast("Enviando pedido...");
    await saveOrderToFirebase(orderData);

    // 2. Abre o WhatsApp como confirmação (Cliente)
    checkout(); // Chama sua função existente que formata o Zap
  };
</script>
